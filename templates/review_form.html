{% extends "base.html" %}

{% block title %}Новая рецензия{% endblock %}

{% block content %}
<section class="page-head">
    <div>
        <h1>Новая рецензия</h1>
        <p>{{ book.title }}</p>
    </div>
</section>

<form class="review-form" method="post">
    <div class="field">
        <label for="rating">Оценка</label>
        <select id="rating" name="rating" required>
            {% for value, label in rating_labels %}
                <option value="{{ value }}" {% if value == selected_rating %}selected{% endif %}>{{ label }}</option>
            {% endfor %}
        </select>
    </div>
    <div class="field">
        <label for="text">Текст рецензии</label>
        <textarea id="text" name="text" rows="8" required>{{ request.form.get('text', '') }}</textarea>
    </div>
    <div class="inline-actions">
        <button class="button" type="submit">Сохранить</button>
        <a class="button ghost" href="{{ url_for('book_detail', book_id=book.id) }}">Отмена</a>
    </div>
</form>
{% endblock %}
